<!DOCTYPE html> 
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Personal Course Organizer">
    <title>Add Courses-Personal course Organizer</title>
    <link rel="stylesheet" href="mystyle.css">
    </head>
    <body>
        <header>
          <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="my-courses.html">My Courses</a></li>
                <li><a href="add-course.html">Add Course</a></li>
                <li><a href="contact-us.html">Contact Us</a></li>
            </ul>
         </nav>
        </header>
        <main>
            <form class="form-container">
                 <div class="form-group">
                    <label>Course Name</label>
                    <input type="text" required placeholder="Enter course name">
                 </div>

                 <div class="form-group">
                    <label>Course Code</label>
                    <input type="text"required placeholder="Example: IT111">
  
                 </div>
                 <div class="form-group">
                    <label>Instructor Name</label>
                    <input type="text" required placeholder="Enter instructor name">
                 </div>
                <div class="form-group">
                    <label>Credit Hours</label>
                    <input type="text" required placeholder="Enter credit hours">
                </div>

                <div class="form-group full">
                    <label>Course Status</label>
                    <select>
                       <option>Planned</option>
                        <option>In Progress</option>
                       <option>Completed</option>
                    </select>
                </div>

                <div class="form-group full">
                   <label>Notes</label>
                   <textarea placeholder="Write any notes about the course"></textarea>
                </div>

                <button>Submit course</button> 

        </form>
        </main>
         <footer><p>&copy; 2026-Personal Course Organizer-Designed by Malak</p></footer>     
    </body>
</html>
