    <title>Home-Personal course Organizer</title>
    <link rel="stylesheet" href="mystyle.css">

    <body>
        <header>
            <nav>
             <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="my-courses.html">My Courses</a></li>
                <li><a href="add-course.html">Add Course</a></li>
                <li><a href="contact-us.html">Contact Us</a></li>
             </ul>

        <main>
          <form class="form-container">
            <div class="form-group">
            <label>Your Name</label>
            <input type="text" required placeholder="Enter your name">
            </div>
            <div class="form-group">
            <label>Your Email</label>
            <input type="Email" required placeholder="Enter Your Email" value="@">
            </div>
            <div class="form-group">
            <label>Your phone</label>
            <input type="number" required placeholder="Enter your number">
            </div>
            <div class="form-group full">
              <label for="Your problem">Notes</label>
              <textarea id="notes" name="Your problem" placeholder="Enter your problem here..."></textarea>
            </div>
            <button>Submit</button> 
           </form>
